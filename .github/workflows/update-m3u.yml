name: 更新频道列表

on:
  schedule:
    # 北京时间 07:00 和 17:00 (UTC时间 23:00 和 09:00)
    - cron: '0 23 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:  # 允许手动触发

env:
  NODE_VERSION: '24'  # 环境变量适配 Node.js 24

jobs:
  download-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予写入权限，用于强制推送

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 下载并保存频道列表（添加时间戳）
        run: |
          echo "正在从 http://xymm.iptvlive.icu/ 下载频道列表..."
          
          # 下载原始内容
          curl -L --max-time 30 --retry 3 -o xymm_temp.m3u "http://xymm.iptvlive.icu/"
          
          # 验证下载内容
          if [ ! -f xymm_temp.m3u ]; then
            echo "错误：文件下载失败"
            exit 1
          fi
          
          if [ ! -s xymm_temp.m3u ]; then
            echo "错误：下载的文件为空"
            exit 1
          fi
          
          # 获取北京时间
          BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          
          # 复制原始内容并添加时间戳注释
          cp xymm_temp.m3u xymm.m3u
          
          # 在文件末尾添加时间戳（M3U格式使用#开头的注释行）
          echo "" >> xymm.m3u
          echo "# 最后更新时间: $BEIJING_TIME (北京时间)" >> xymm.m3u
          echo "# 更新来源: http://xymm.iptvlive.icu/" >> xymm.m3u
          
          # 清理临时文件
          rm xymm_temp.m3u
          
          echo "下载完成，文件大小："
          ls -lh xymm.m3u
          echo "文件末尾内容预览："
          tail -n 5 xymm.m3u

      - name: 提交并推送更新
        run: |
          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 获取当前分支名称
          CURRENT_BRANCH=$(git branch --show-current)
          echo "当前分支: $CURRENT_BRANCH"
          
          # 检查文件是否存在
          if [ -f xymm.m3u ]; then
            echo "文件 xymm.m3u 已存在"
            ls -la xymm.m3u
          else
            echo "错误：文件 xymm.m3u 不存在"
            exit 1
          fi
          
          # 添加文件
          git add xymm.m3u -f
          
          # 检查是否有变更需要提交
          if git diff --cached --quiet; then
            echo "频道列表无变化，跳过提交"
          else
            BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
            git commit -m "自动更新频道列表 - $BEIJING_TIME [skip ci]"
            # 推送到当前分支
            git push origin HEAD:$CURRENT_BRANCH
            echo "已成功推送更新到 $CURRENT_BRANCH 分支"
          fi
          
          # 显示仓库中的文件
          echo "仓库当前文件列表："
          ls -la

      - name: 上传文件作为工作流产物（备份）
        uses: actions/upload-artifact@v4
        with:
          name: xymm-channel-list
          path: xymm.m3u
          retention-days: 7
